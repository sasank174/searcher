<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Search Builder</title>
    <link rel="stylesheet" href="style.css"></head>

<body>
    <main class="panel">
        <section class="content">
            <form id="searchForm">
                <div class="field">
                    <label for="industry">Industry preset</label>
                    <select name="industry" id="industry">
                        <option value="General" selected>General</option>
                        <option value="Banking & Financial Services">Banking & Financial Services</option>
                        <option value="Fintech & Payments">Fintech & Payments</option>
                        <option value="IT & Technology Services">IT & Technology Services</option>
                        <option value="Global Tech & Product (Big Tech)">Global Tech & Product (Big Tech)</option>
                        <option value="E-commerce & Retail Tech">E-commerce & Retail Tech</option>
                        <option value="Telecom & Connectivity">Telecom & Connectivity</option>
                        <option value="Healthcare & Pharmaceuticals">Healthcare & Pharmaceuticals</option>
                        <option value="FMCG / Consumer Goods">FMCG / Consumer Goods</option>
                        <option value="Logistics & Transportation">Logistics & Transportation</option>
                        <option value="Analytics, Data Platforms & Growing Startups">Analytics, Data Platforms & Growing
                            Startups</option>
                    </select>
                </div>

                <div class="field">
                    <label for="sectorToggle">Sector tags</label>
                    <div class="dropdown" id="sectorDropdownWrapper">
                        <button type="button" class="dropdown-btn" id="sectorToggle" aria-expanded="false"
                            aria-controls="sectorDropdown">
                            <span id="sectorSummary">Select sectors</span>
                        </button>

                        <div class="dropdown-content" id="sectorDropdown">
                            <label><input type="checkbox" value="8" data-label="Telecommunications">
                                Telecommunications</label>
                            <label><input type="checkbox" value="96" data-label="IT Services and IT Consulting"> IT
                                Services and IT Consulting</label>
                            <label><input type="checkbox" value="4" data-label="Software Development"> Software
                                Development</label>
                            <label><input type="checkbox" value="6" data-label="Technology, Information and Internet">
                                Technology, Information and Internet</label>
                            <label><input type="checkbox" value="43" data-label="Financial Services"> Financial
                                Services</label>
                            <label><input type="checkbox" value="11" data-label="Business Consulting and Services">
                                Business Consulting and Services</label>
                            <label><input type="checkbox" value="84" data-label="Information Services"> Information
                                Services</label>
                            <label><input type="checkbox" value="41" data-label="Banking"> Banking</label>
                            <label><input type="checkbox" value="14" data-label="Hospitals and Health Care"> Hospitals
                                and Health Care</label>
                            <label><input type="checkbox" value="15" data-label="Pharmaceutical Manufacturing">
                                Pharmaceutical Manufacturing</label>
                            <label><input type="checkbox" value="1810" data-label="Professional Services"> Professional
                                Services</label>
                            <label><input type="checkbox" value="17" data-label="Medical Equipment Manufacturing">
                                Medical Equipment Manufacturing</label>
                            <label><input type="checkbox" value="25" data-label="Manufacturing"> Manufacturing</label>
                            <label><input type="checkbox" value="116"
                                    data-label="Transportation, Logistics, Supply Chain and Storage"> Transportation,
                                Logistics, Supply Chain and Storage</label>
                            <label><input type="checkbox" value="132" data-label="E-Learning Providers"> E-Learning
                                Providers</label>
                            <label><input type="checkbox" value="34" data-label="Food and Beverage Services"> Food and
                                Beverage Services</label>
                            <label><input type="checkbox" value="28" data-label="Entertainment Providers"> Entertainment
                                Providers</label>
                            <label><input type="checkbox" value="1923" data-label="Executive Search Services"> Executive
                                Search Services</label>
                        </div>
                    </div>
                    <div class="selected-sectors" id="selectedSectors" aria-live="polite"></div>
                </div>

                <div class="inline">
                    <div class="field">
                        <label for="hours">Posted within (hours)</label>
                        <input type="number" name="hours" id="hours" min="1" max="168" step="1" value="4" required>
                    </div>

                    <button type="submit">Generate Links</button>
                </div>

                <div class="inline compact">
                    <div class="check-field">
                        <input type="checkbox" name="under10" id="under10">
                        <label for="under10">Under 10 applications</label>
                    </div>

                    <div class="check-field">
                        <input type="checkbox" name="hasVerification" id="hasVerification">
                        <label for="hasVerification">Has verification</label>
                    </div>
                </div>

                <div class="inline compact">
                    <div class="check-field">
                        <a href="https://www.linkedin.com/search/results/content/?keywords=%22walk%20in%20interview%22%20%22Data%20Engineer%22%20Bangalore&origin=CLUSTER_EXPANSION&datePosted=%5B%22past-24h%22%5D"
                            target="_blank">walk in interview</a>
                    </div>

                    <div class="check-field">
                        <a href="https://www.linkedin.com/search/results/content/?keywords=%22walk-in%20drive%22%20%22Data%20Engineer%22%20Bangalore&origin=CLUSTER_EXPANSION&datePosted=%5B%22past-24h%22%5D"
                            target="_blank">walk in drive</a>
                    </div>
                </div>
            </form>

            <section class="result" id="result">
                <div class="result-head">
                    <div>
                        <h2>Generated city links</h2>
                    </div>
                    <div class="result-count" id="resultCount">0 links</div>
                </div>

                <ul id="resultList"></ul>
            </section>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
