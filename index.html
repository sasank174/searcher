<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Search Builder</title>
    <style>
        :root {
            --bg-top: #eef7ff;
            --bg-bottom: #f9fbff;
            --card: rgba(255, 255, 255, 0.95);
            --card-strong: #ffffff;
            --text-main: #11203a;
            --text-soft: #4b6284;
            --accent: #0a66c2;
            --accent-dark: #074b8d;
            --border: #d8e5f7;
            --border-strong: #bfd7f3;
            --focus: #7ab4ff;
            --muted: #eef4fb;
            --shadow: 0 16px 36px rgba(17, 32, 58, 0.12);
            --shadow-soft: 0 18px 40px rgba(17, 32, 58, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Sora", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at 10% 5%, #d9ecff 0%, transparent 40%),
                radial-gradient(circle at 95% 95%, #e8f3ff 0%, transparent 35%),
                linear-gradient(160deg, var(--bg-top), var(--bg-bottom));
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .panel {
            width: min(100%, 960px);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 28px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
            overflow: hidden;
            animation: reveal 420ms ease;
        }

        @keyframes reveal {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero,
        .content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            padding: 28px 28px 0;
        }

        .content {
            padding-bottom: 28px;
            align-items: start;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
            padding: 8px 12px;
            border-radius: 999px;
            background: linear-gradient(180deg, #f6fbff, #e9f3ff);
            border: 1px solid var(--border);
            color: var(--accent-dark);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(2rem, 3vw, 3rem);
            line-height: 1.02;
            letter-spacing: -0.04em;
        }

        .sub {
            margin: 0;
            color: var(--text-soft);
            line-height: 1.55;
            max-width: 58ch;
        }

        .hero-card,
        form,
        .result {
            border: 1px solid var(--border);
            border-radius: 24px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(244, 249, 255, 0.95));
            box-shadow: var(--shadow-soft);
        }

        .hero-card,
        .result,
        form {
            padding: 22px;
        }

        .hero-card h2,
        .result-head h2 {
            margin: 0 0 10px;
            font-size: 1.05rem;
        }

        .hero-card p,
        .helper,
        .result-head p {
            margin: 0;
            color: var(--text-soft);
            font-size: 0.92rem;
            line-height: 1.55;
        }

        .metrics {
            margin-top: 18px;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
        }

        .metric {
            padding: 12px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--card-strong);
        }

        .metric strong {
            display: block;
            margin-bottom: 4px;
            font-size: 1rem;
        }

        .metric span {
            color: var(--text-soft);
            font-size: 0.82rem;
        }

        form {
            display: grid;
            gap: 18px;
        }

        .field {
            display: grid;
            gap: 8px;
        }

        label {
            font-size: 0.94rem;
            font-weight: 600;
        }

        select,
        input,
        button {
            width: 100%;
            border-radius: 14px;
            border: 1px solid var(--border-strong);
            padding: 12px 14px;
            font-size: 0.98rem;
            color: var(--text-main);
            background: #fff;
            transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease, opacity 180ms ease;
            font-family: inherit;
        }

        select:focus,
        input:focus,
        button:focus-visible {
            outline: none;
            border-color: var(--focus);
            box-shadow: 0 0 0 3px rgba(122, 180, 255, 0.28);
        }

        select:hover,
        input:hover,
        button:hover {
            transform: translateY(-1px);
        }

        .inline {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: end;
        }

        .inline.compact {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .check-field {
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 52px;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: linear-gradient(180deg, #fbfdff, #f1f7ff);
            transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
        }

        .check-field:focus-within {
            border-color: var(--focus);
            box-shadow: 0 0 0 3px rgba(122, 180, 255, 0.2);
            transform: translateY(-1px);
        }

        .check-field label {
            margin: 0;
            font-size: 0.9rem;
            cursor: pointer;
            user-select: none;
        }

        input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            margin: 0;
            border: 1.5px solid #8aa8cf;
            border-radius: 7px;
            background: #fff;
            display: grid;
            place-items: center;
            cursor: pointer;
            transition: background 180ms ease, border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
            flex-shrink: 0;
        }

        input[type="checkbox"]::before {
            content: "";
            width: 10px;
            height: 6px;
            border-left: 2px solid #fff;
            border-bottom: 2px solid #fff;
            transform: rotate(-45deg) scale(0);
            transform-origin: center;
            transition: transform 160ms ease;
        }

        input[type="checkbox"]:checked {
            background: linear-gradient(180deg, var(--accent), #0958a7);
            border-color: var(--accent);
            box-shadow: 0 8px 16px rgba(10, 102, 194, 0.22);
        }

        input[type="checkbox"]:checked::before {
            transform: rotate(-45deg) scale(1);
        }

        input[type="checkbox"]:focus-visible {
            outline: none;
            box-shadow: 0 0 0 3px rgba(122, 180, 255, 0.28);
        }

        button {
            background: linear-gradient(180deg, var(--accent), #0958a7);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            border-color: transparent;
            min-width: 170px;
            box-shadow: 0 14px 28px rgba(10, 102, 194, 0.22);
        }

        button:hover {
            background: linear-gradient(180deg, #0b6fd3, var(--accent-dark));
        }

        .dropdown {
            position: relative;
        }

        .dropdown-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            text-align: left;
            background: #fff;
            color: var(--text-main);
            box-shadow: none;
            min-width: 0;
        }

        .dropdown-btn::after {
            content: "\25BE";
            color: var(--accent);
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .dropdown-btn:disabled {
            background: #f5f8fc;
            color: #7f90aa;
            border-color: #dbe6f2;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .dropdown-btn:disabled::after {
            color: #9cb1cc;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            width: 100%;
            max-height: 280px;
            overflow-y: auto;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 20px 36px rgba(17, 32, 58, 0.14);
            z-index: 10;
        }

        .dropdown.open .dropdown-content {
            display: block;
        }

        .dropdown-content label {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 12px;
            font-size: 0.92rem;
            cursor: pointer;
        }

        .dropdown-content label:hover {
            background: #f2f7ff;
        }

        .dropdown-disabled .dropdown-content {
            display: none;
        }

        .selected-sectors {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            min-height: 20px;
        }

        .sector-chip {
            display: inline-flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--muted);
            color: var(--accent-dark);
            font-size: 0.84rem;
            font-weight: 600;
        }

        .result-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 18px;
        }

        .result-count {
            padding: 8px 12px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--muted);
            color: var(--accent-dark);
            font-size: 0.84rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .result ul {
            margin: 0;
            padding: 0;
            list-style: none;
            display: grid;
            gap: 10px;
        }

        .result li a {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(240, 247, 255, 0.96));
            box-shadow: 0 8px 18px rgba(17, 32, 58, 0.06);
            position: relative;
            overflow: hidden;
            color: var(--accent-dark);
            text-decoration: none;
            transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease, color 180ms ease;
        }

        .result li a::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(10, 102, 194, 0.06), transparent 45%);
            opacity: 0;
            transition: opacity 180ms ease;
        }

        .result li a::after {
            content: "\2197";
            font-size: 1rem;
            color: var(--accent);
            flex-shrink: 0;
            transition: transform 180ms ease, color 180ms ease;
        }

        .result li a:hover,
        .result li a:focus-visible {
            transform: translateY(-2px);
            border-color: #b5d2f7;
            box-shadow: 0 14px 26px rgba(10, 102, 194, 0.14);
            color: var(--accent);
            outline: none;
        }

        .result li a:hover::before,
        .result li a:focus-visible::before {
            opacity: 1;
        }

        .result li a:hover::after,
        .result li a:focus-visible::after {
            transform: translate(2px, -2px);
            color: var(--accent-dark);
        }

        .result-copy {
            margin-top: 16px;
            width: 100%;
            min-width: 0;
            background: #fff;
            color: var(--accent-dark);
            border: 1px solid var(--border-strong);
            box-shadow: none;
        }

        .result-copy:hover {
            background: #f4f9ff;
        }

        .result-copy:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @media (max-width: 860px) {
            .hero,
            .content {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 620px) {
            body {
                padding: 16px;
            }

            .panel {
                border-radius: 20px;
            }

            .hero,
            .content {
                padding-left: 18px;
                padding-right: 18px;
            }

            .hero {
                padding-top: 20px;
            }

            form,
            .hero-card,
            .result {
                padding: 18px;
                border-radius: 18px;
            }

            .inline,
            .inline.compact,
            .metrics {
                grid-template-columns: 1fr;
            }

            button {
                min-width: 0;
            }

            .result-head {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <main class="panel">
        <section class="content">
            <form id="searchForm">
                <div class="field">
                    <label for="industry">Industry preset</label>
                    <select name="industry" id="industry">
                        <option value="General" selected>General</option>
                        <option value="Banking & Financial Services">Banking & Financial Services</option>
                        <option value="Fintech & Payments">Fintech & Payments</option>
                        <option value="IT & Technology Services">IT & Technology Services</option>
                        <option value="Global Tech & Product (Big Tech)">Global Tech & Product (Big Tech)</option>
                        <option value="E-commerce & Retail Tech">E-commerce & Retail Tech</option>
                        <option value="Telecom & Connectivity">Telecom & Connectivity</option>
                        <option value="Healthcare & Pharmaceuticals">Healthcare & Pharmaceuticals</option>
                        <option value="FMCG / Consumer Goods">FMCG / Consumer Goods</option>
                        <option value="Logistics & Transportation">Logistics & Transportation</option>
                        <option value="Analytics, Data Platforms & Growing Startups">Analytics, Data Platforms & Growing Startups</option>
                    </select>
                </div>

                <div class="field">
                    <label for="sectorToggle">Sector tags</label>
                    <div class="dropdown" id="sectorDropdownWrapper">
                        <button type="button" class="dropdown-btn" id="sectorToggle" aria-expanded="false" aria-controls="sectorDropdown">
                            <span id="sectorSummary">Select sectors</span>
                        </button>

                        <div class="dropdown-content" id="sectorDropdown">
                            <label><input type="checkbox" value="8" data-label="Telecommunications"> Telecommunications</label>
                            <label><input type="checkbox" value="96" data-label="IT Services and IT Consulting"> IT Services and IT Consulting</label>
                            <label><input type="checkbox" value="4" data-label="Software Development"> Software Development</label>
                            <label><input type="checkbox" value="6" data-label="Technology, Information and Internet"> Technology, Information and Internet</label>
                            <label><input type="checkbox" value="43" data-label="Financial Services"> Financial Services</label>
                            <label><input type="checkbox" value="11" data-label="Business Consulting and Services"> Business Consulting and Services</label>
                            <label><input type="checkbox" value="84" data-label="Information Services"> Information Services</label>
                            <label><input type="checkbox" value="41" data-label="Banking"> Banking</label>
                            <label><input type="checkbox" value="14" data-label="Hospitals and Health Care"> Hospitals and Health Care</label>
                            <label><input type="checkbox" value="15" data-label="Pharmaceutical Manufacturing"> Pharmaceutical Manufacturing</label>
                            <label><input type="checkbox" value="1810" data-label="Professional Services"> Professional Services</label>
                            <label><input type="checkbox" value="17" data-label="Medical Equipment Manufacturing"> Medical Equipment Manufacturing</label>
                            <label><input type="checkbox" value="25" data-label="Manufacturing"> Manufacturing</label>
                            <label><input type="checkbox" value="116" data-label="Transportation, Logistics, Supply Chain and Storage"> Transportation, Logistics, Supply Chain and Storage</label>
                            <label><input type="checkbox" value="132" data-label="E-Learning Providers"> E-Learning Providers</label>
                            <label><input type="checkbox" value="34" data-label="Food and Beverage Services"> Food and Beverage Services</label>
                            <label><input type="checkbox" value="28" data-label="Entertainment Providers"> Entertainment Providers</label>
                            <label><input type="checkbox" value="1923" data-label="Executive Search Services"> Executive Search Services</label>
                        </div>
                    </div>
                    <div class="selected-sectors" id="selectedSectors" aria-live="polite"></div>
                </div>

                <div class="inline">
                    <div class="field">
                        <label for="hours">Posted within (hours)</label>
                        <input type="number" name="hours" id="hours" min="1" max="168" step="1" value="4" required>
                    </div>

                    <button type="submit">Generate Links</button>
                </div>

                <div class="inline compact">
                    <div class="check-field">
                        <input type="checkbox" name="under10" id="under10">
                        <label for="under10">Under 10 applications</label>
                    </div>

                    <div class="check-field">
                        <input type="checkbox" name="hasVerification" id="hasVerification">
                        <label for="hasVerification">Has verification</label>
                    </div>
                </div>
            </form>

            <section class="result" id="result">
                <div class="result-head">
                    <div>
                        <h2>Generated city links</h2>
                    </div>
                    <div class="result-count" id="resultCount">0 links</div>
                </div>

                <ul id="resultList"></ul>
            </section>
        </section>
    </main>

    <script>
        const form = document.getElementById("searchForm");
        const industryInput = document.getElementById("industry");
        const hoursInput = document.getElementById("hours");
        const resultList = document.getElementById("resultList");
        const under10Input = document.getElementById("under10");
        const hasVerificationInput = document.getElementById("hasVerification");
        const resultCount = document.getElementById("resultCount");
        const copyButton = document.getElementById("copyButton");
        const copyStatus = document.getElementById("copyStatus");

        const sectorDropdownWrapper = document.getElementById("sectorDropdownWrapper");
        const sectorToggle = document.getElementById("sectorToggle");
        const sectorSummary = document.getElementById("sectorSummary");
        const selectedSectors = document.getElementById("selectedSectors");
        const sectorHint = document.getElementById("sectorHint");
        const sectorCheckboxes = Array.from(document.querySelectorAll("#sectorDropdown input[type='checkbox']"));

        const generalGeoTargets = [
            { label: "Bengaluru", geoId: "105214831" },
            { label: "Bangalore", geoId: "112376381" },
            { label: "Hyderabad", geoId: "105556991" },
            { label: "Chennai", geoId: "106888327" },
            { label: "Pune", geoId: "114806696" }
        ];

        let generatedLinks = [];

        function getSelectedSectorData() {
            return sectorCheckboxes
                .filter((checkbox) => checkbox.checked)
                .map((checkbox) => ({
                    value: checkbox.value,
                    label: checkbox.dataset.label || checkbox.parentElement.textContent.trim()
                }));
        }

        function closeSectorDropdown() {
            sectorDropdownWrapper.classList.remove("open");
            sectorToggle.setAttribute("aria-expanded", "false");
        }

        function updateSectorSummary() {
            const selections = getSelectedSectorData();

            if (selections.length === 0) {
                sectorSummary.textContent = "Select sectors";
                selectedSectors.innerHTML = "";
                return;
            }

            sectorSummary.textContent = selections.length === 1 ? selections[0].label : selections.length + " sectors selected";
            selectedSectors.innerHTML = selections
                .map((sector) => '<span class="sector-chip">' + sector.label + '</span>')
                .join("");
        }

        function clearSectorSelections() {
            sectorCheckboxes.forEach(function (checkbox) {
                checkbox.checked = false;
            });
            updateSectorSummary();
        }

        function setSectorAvailability() {
            const isGeneral = industryInput.value === "General";

            sectorToggle.disabled = !isGeneral;
            sectorDropdownWrapper.classList.toggle("dropdown-disabled", !isGeneral);
            sectorHint.textContent = isGeneral
                ? "Sector filters are active for the General preset."
                : "Sector filters are disabled because this industry preset already applies a company filter.";

            if (!isGeneral) {
                clearSectorSelections();
                closeSectorDropdown();
            }
        }

        function updateLinks() {
            resultList.innerHTML = "";

            const hours = Number(hoursInput.value);
            const industry = industryInput.value;

            if (!Number.isFinite(hours) || hours < 1 || hours > 168) {
                generatedLinks = [];
                resultCount.textContent = "0 links";
                copyButton.disabled = true;
                copyButton.textContent = "Copy first link";
                return;
            }

            let baseUrl = "https://www.linkedin.com/jobs/search/?distance=100&keywords=azure%20data%20engineer&origin=JOB_SEARCH_PAGE_JOB_FILTER&refresh=true";
            baseUrl += "&f_TPR=r" + (hours * 3600);

            if (industry === "General") {
                const sectorValues = getSelectedSectorData().map(function (sector) {
                    return sector.value;
                });

                if (sectorValues.length > 0) {
                    baseUrl += "&f_I=" + sectorValues.join("%2C");
                }
            }

            if (under10Input.checked) {
                baseUrl += "&f_EA=true";
            }

            if (hasVerificationInput.checked) {
                baseUrl += "&f_VJ=true";
            }

            if (industry === "Banking & Financial Services") {
                baseUrl += "&f_C=163379%2C5635%2C5632%2C8888852%2C3797085%2C1123%2C11412006%2C29082158%2C1235%2C21175%2C2603%2C417361%2C10117963%2C1068%2C1067%2C33991104%2C162609%2C92839957%2C33953647%2C164151%2C2967%2C4777%2C68360623";
            } else if (industry === "Fintech & Payments") {
                baseUrl += "&f_C=107766780%2C31237091%2C13183020%2C2267249%2C14485479%2C99914745%2C10813156%2C92862719%2C303524%2C3788927%2C97215080%2C10479149%2C13420511%2C2340144";
            } else if (industry === "IT & Technology Services") {
                baseUrl += "&f_C=76113313%2C3067%2C89835790%2C3586%2C1073%2C1038%2C86813252";
            } else if (industry === "Global Tech & Product (Big Tech)") {
                baseUrl += "&f_C=29078155%2C1028%2C80918929%2C106452776%2C76108196%2C10449749%2C12895978%2C107009595%2C3185%2C1337%2C1480%2C487488%2C10667%2C1586%2C2382910%2C29053421%2C1035%2C1441";
            } else if (industry === "E-commerce & Retail Tech") {
                baseUrl += "&f_C=105938688%2C93383533%2C422813%2C9252341%2C2100709%2C76108196%2C106452776%2C80918929%2C8848940%2C107602587%2C10037698%2C109903136%2C361348%2C321062%2C1353";
            } else if (industry === "Telecom & Connectivity") {
                baseUrl += "&f_C=13652663%2C13361480%2C82860777%2C96630155%2C101308841";
            } else if (industry === "Healthcare & Pharmaceuticals") {
                baseUrl += "&f_C=1663%2C1402010%2C3102%2C28729631%2C1406%2C1043%2C106953064%2C1331952%2C157241%2C28059362%2C28423178%2C29076088%2C41469609%2C5470755%2C607957";
            } else if (industry === "FMCG / Consumer Goods") {
                baseUrl += "&f_C=78028413%2C16271%2C102418423%2C1116%2C1248%2C1393";
            } else if (industry === "Logistics & Transportation") {
                baseUrl += "&f_C=1214%2C479080%2C2312777%2C347965";
            } else if (industry === "Analytics, Data Platforms & Growing Startups") {
                baseUrl += "&f_C=3139796%2C18482523%2C1785481%2C82592055%2C18734010%2C105990038%2C10448588%2C613819%2C3618960%2C18966049%2C5208967";
            }

            generatedLinks = generalGeoTargets.map(function (target) {
                return {
                    label: target.label,
                    url: baseUrl + "&geoId=" + target.geoId
                };
            });

            generatedLinks.forEach(function (entry) {
                const li = document.createElement("li");
                const link = document.createElement("a");

                link.href = entry.url;
                link.textContent = entry.label;
                link.target = "_blank";
                link.rel = "noreferrer";

                li.appendChild(link);
                resultList.appendChild(li);
            });

            resultCount.textContent = generatedLinks.length + " links";
            copyButton.disabled = generatedLinks.length === 0;
            copyButton.textContent = "Copy first link";
        }

        form.addEventListener("submit", function (event) {
            event.preventDefault();
            updateLinks();
        });

        sectorToggle.addEventListener("click", function () {
            if (sectorToggle.disabled) {
                return;
            }

            const isOpen = sectorDropdownWrapper.classList.toggle("open");
            sectorToggle.setAttribute("aria-expanded", String(isOpen));
        });

        sectorCheckboxes.forEach(function (checkbox) {
            checkbox.addEventListener("change", function () {
                updateSectorSummary();
                updateLinks();
            });
        });

        document.addEventListener("click", function (event) {
            if (!sectorDropdownWrapper.contains(event.target)) {
                closeSectorDropdown();
            }
        });

        industryInput.addEventListener("change", function () {
            setSectorAvailability();
            updateLinks();
        });

        hoursInput.addEventListener("input", updateLinks);
        under10Input.addEventListener("change", updateLinks);
        hasVerificationInput.addEventListener("change", updateLinks);

        copyButton.addEventListener("click", async function () {
            if (generatedLinks.length === 0 || !navigator.clipboard) {
                return;
            }

            try {
                await navigator.clipboard.writeText(generatedLinks[0].url);
                copyButton.textContent = "Copied first link";
                copyStatus.textContent = "First generated link copied to clipboard.";
            } catch (error) {
                copyStatus.textContent = "Clipboard copy failed.";
            }
        });

        setSectorAvailability();
        updateSectorSummary();
        updateLinks();
    </script>
</body>

</html>
